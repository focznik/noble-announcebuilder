<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Noble Announcement Builder</title>
<style>
:root{
  --bg:#070b12;
  --panel:#0d1420;
  --panel2:#101827;
  --line:#263244;
  --line2:#344256;
  --text:#eef4ff;
  --muted:#8fa1b8;
  --blue:#38bdf8;
  --cyan:#22d3ee;
  --green:#2dd4bf;
  --red:#fb7185;
  --purple:#a78bfa;
  --yellow:#facc15;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:
    linear-gradient(135deg, rgba(56,189,248,.10), transparent 25%),
    linear-gradient(315deg, rgba(45,212,191,.08), transparent 30%),
    var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
  padding:22px;
}

.app{
  max-width:1320px;
  margin:0 auto;
}

.header{
  border:1px solid var(--line);
  background:#09111d;
  padding:20px 22px;
  margin-bottom:16px;
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
}

.lang-box{
  min-width:190px;
}

.lang-box label{
  margin:0 0 7px;
}

select{
  width:100%;
  background:#070b12;
  color:var(--text);
  border:1px solid var(--line2);
  padding:10px 12px;
  font-size:14px;
  outline:none;
}

select:focus{
  border-color:var(--cyan);
}

.header h1{
  margin:0;
  font-size:28px;
  letter-spacing:-.5px;
}

.header p{
  margin:6px 0 0;
  color:var(--muted);
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:300px 1fr 430px;
  gap:16px;
  align-items:start;
}

.panel{
  background:rgba(13,20,32,.96);
  border:1px solid var(--line);
  padding:16px;
}

.panel-title{
  font-size:13px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.12em;
  margin-bottom:12px;
  font-weight:800;
}

.server-list{
  display:grid;
  gap:8px;
}

.server-btn,
.time-btn,
.lobby-btn,
.copy-btn,
.small-btn{
  border:1px solid var(--line2);
  background:#0a101a;
  color:var(--text);
  cursor:pointer;
  font-weight:800;
  transition:.12s ease;
}

.server-btn{
  width:100%;
  text-align:left;
  padding:14px 12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  min-height:52px;
}

.server-btn span{
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}

.server-btn:hover,
.time-btn:hover,
.lobby-btn:hover,
.copy-btn:hover,
.small-btn:hover{
  border-color:var(--blue);
  background:#101a2a;
}

.server-btn.active{
  background:#10243a;
  border-color:var(--blue);
  box-shadow:inset 4px 0 0 var(--blue);
}

.main-stack{
  display:grid;
  gap:16px;
}

.controls-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

label{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:7px;
}

input{
  width:100%;
  background:#070b12;
  color:var(--text);
  border:1px solid var(--line2);
  padding:12px;
  font-size:15px;
  outline:none;
}

input:focus{
  border-color:var(--cyan);
}

.time-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
}

.time-btn{
  padding:12px 8px;
  font-size:14px;
}

.time-btn.active{
  background:#10243a;
  border-color:var(--cyan);
  color:#e0faff;
}

.lobby-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.lobby-btn{
  padding:12px 8px;
  font-size:13px;
}

.lobby-btn.active{
  background:#172033;
  border-color:var(--green);
  box-shadow:inset 0 -3px 0 var(--green);
}

.help-row{
  display:flex;
  gap:8px;
  margin-top:12px;
}

.small-btn{
  width:100%;
  padding:10px;
  font-size:13px;
}

.copy-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

.copy-btn{
  padding:12px;
  font-size:14px;
}

.copy-btn.main{
  grid-column:1 / -1;
  background:#12302d;
  border-color:#1f766e;
}

textarea{
  width:100%;
  min-height:610px;
  resize:vertical;
  background:#050811;
  color:#dbeafe;
  border:1px solid var(--line2);
  padding:14px;
  font-family:Consolas, monospace;
  line-height:1.45;
  font-size:13px;
  outline:none;
}

.badge{
  display:inline-block;
  padding:5px 8px;
  border:1px solid var(--line2);
  background:#07101d;
  color:var(--muted);
  font-size:12px;
  margin-top:10px;
}

.hidden{display:none!important}

.toast{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#0f2f2d;
  border:1px solid #1f766e;
  color:white;
  padding:12px 16px;
  opacity:0;
  pointer-events:none;
  transition:.18s ease;
}

.toast.show{opacity:1}

@media(max-width:1100px){
  .grid{grid-template-columns:1fr}
  textarea{min-height:420px}
}

@media(max-width:700px){
  body{padding:12px}
  .controls-grid,.copy-grid{grid-template-columns:1fr}
  .time-grid{grid-template-columns:repeat(3,1fr)}
  .lobby-grid{grid-template-columns:repeat(2,1fr)}
  .header{flex-direction:column}
  .lang-box{width:100%}
  .header h1{font-size:22px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1 data-i18n="title">⚡ Noble Announcement Builder</h1>
      <p data-i18n="subtitle">Wybierz serwer, lobby i godzinę — wiadomość generuje się automatycznie. Potem tylko kopiujesz.</p>
    </div>

    <div class="lang-box">
      <label data-i18n="language">Język strony</label>
      <select id="language" onchange="changeLanguage()">
        <option value="en">🇬🇧 English</option>
        <option value="pl">🇵🇱 Polski</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="ru">🇷🇺 Русский</option>
      </select>
    </div>
  </div>

  <div class="grid">
    <aside class="panel">
      <div class="panel-title" data-i18n="servers">Servers</div>
      <div class="server-list">
        <button class="server-btn active" data-server="div0" onclick="selectServer('div0')">Noble Division 0 <span>+15 min</span></button>
        <button class="server-btn" data-server="div2" onclick="selectServer('div2')">Noble Division 2 <span>+15 min</span></button>
        <button class="server-btn" data-server="div3" onclick="selectServer('div3')">Noble Division 3 <span>+15 min</span></button>
        <button class="server-btn" data-server="247" onclick="selectServer('247')">Noble 24/7 <span>+20 min</span></button>
        <button class="server-btn" data-server="solos" onclick="selectServer('solos')">Noble Solos <span>+20 min</span></button>
        <button class="server-btn" data-server="solosclosed" onclick="selectServer('solosclosed')">Solos Closed <span>+20 min</span></button>
      </div>
      <div class="badge" id="delayBadge">First game: +15 min</div>
    </aside>

    <main class="main-stack">
      <section class="panel">
        <div class="panel-title" data-i18n="setup">Setup</div>
        <div class="controls-grid">
          <div>
            <label data-i18n="registrationOpens">Registration opens</label>
            <input type="datetime-local" id="time" oninput="clearActiveTime(); generate()">
          </div>
          <div>
            <label data-i18n="hostOfSession">Host Of Session</label>
            <input id="userid" value="1057478252865798174" placeholder="Main host Discord ID" oninput="saveUser(); generate()">
          </div>
          <div>
            <label data-i18n="coHostOfSession">Co-Host Of Session</label>
            <input id="cohostid" placeholder="Optional co-host Discord ID" oninput="saveUser(); generate()">
          </div>
        </div>

        <div id="sessionBox" class="hidden">
          <label style="margin-top:14px" data-i18n="sessionNumber">24/7 Session Number</label>
          <input id="sessionNumber" type="number" min="1" value="1" oninput="generate()">
        </div>

        <div class="help-row">
          <button class="small-btn" onclick="setNow()" data-i18n="useCurrentTime">Use current time</button>
          <button class="small-btn" onclick="addMinutes(15)">+15 min</button>
          <button class="small-btn" onclick="addMinutes(20)">+20 min</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title" data-i18n="quickHours">Quick hours</div>
        <div class="time-grid" id="timeGrid"></div>
      </section>

      <section class="panel">
        <div class="panel-title" data-i18n="lobbyType">Lobby / Type</div>
        <div class="lobby-grid" id="lobbyGrid"></div>
      </section>
    </main>

    <aside class="panel">
      <div class="panel-title" data-i18n="generatedMessage">Generated message</div>
      <div class="copy-grid">
        <button class="copy-btn main" onclick="copyAnnouncement()" data-i18n="copyAnnouncement">Copy Announcement</button>
        <button class="copy-btn" onclick="copyRegTimestamp()" data-i18n="copyRegTimestamp">Copy Reg Timestamp</button>
        <button class="copy-btn" onclick="copyGameTimestamp()" data-i18n="copyGameTimestamp">Copy Game Timestamp</button>
      </div>
      <textarea id="output" spellcheck="false"></textarea>
    </aside>
  </div>
</div>

<div class="toast" id="toast">Copied</div>

let currentLanguage = localStorage.getItem("noble_language") || "en";

function t(key){
  return (translations[currentLanguage] && translations[currentLanguage][key]) || translations.en[key] || key;
}

function getLobbyName(lobby){
  const names = {
    "1":"firstLobby",
    "2":"secondLobby",
    "3":"thirdLobby",
    "power":"powerWeekend"
  };
  return t(names[lobby]);
}

function changeLanguage(){
  currentLanguage = document.getElementById("language").value;
  localStorage.setItem("noble_language", currentLanguage);
  applyLanguage();
}

function applyLanguage(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.dataset.i18n;
    el.textContent = t(key);
  });
  document.getElementById("delayBadge").textContent = t("firstGame") + ": +" + getDelay() + " min";
  renderLobby();
}

function pad(n){return String(n).padStart(2,"0")}

function formatDateValue(date){
  return date.getFullYear()+"-"+pad(date.getMonth()+1)+"-"+pad(date.getDate())+"T"+pad(date.getHours())+":"+pad(date.getMinutes());
}

function setCurrentDateTime(){
  document.getElementById("time").value = formatDateValue(new Date());
}

function setNow(){
  activeHour = null;
  setCurrentDateTime();
  renderTimes();
  generate();
}

function setHour(hour){
  activeHour = hour;
  const now = new Date();
  now.setHours(hour,0,0,0);
  document.getElementById("time").value = formatDateValue(now);
  renderTimes();
  generate();
}

function clearActiveTime(){
  activeHour = null;
  renderTimes();
}

function addMinutes(min){
  activeHour = null;
  const input = document.getElementById("time");
  const base = input.value ? new Date(input.value) : new Date();
  base.setMinutes(base.getMinutes()+min);
  input.value = formatDateValue(base);
  renderTimes();
  generate();
}

function unix(date){return Math.floor(new Date(date).getTime()/1000)}

function saveUser(){
  localStorage.setItem("noble_user", document.getElementById("userid").value);
  localStorage.setItem("noble_cohost", document.getElementById("cohostid").value);
}

function getHostMention(){
  const main = document.getElementById("userid").value.trim();
  const cohost = document.getElementById("cohostid").value.trim();

  if(main && cohost){
    return `<@${main}> & <@${cohost}>`;
  }
  if(main){
    return `<@${main}>`;
  }
  if(cohost){
    return `<@${cohost}>`;
  }
  return `<@>`;
}

function getDelay(){
  if(currentServer === "247" || currentServer === "solos" || currentServer === "solosclosed") return 20;
  return 15;
}

function getLobbyOffset(){
  if(currentServer === "247"){
    if(currentLobby === "2") return 15;
    if(currentLobby === "3") return 30;
    return 0;
  }

  if(currentLobby === "2") return 5;
  if(currentLobby === "3") return 10;
  return 0;
}

function selectServer(server){
  currentServer = server;
  localStorage.setItem("noble_server", server);

  if(server !== "solos" && currentLobby === "power") currentLobby = "1";
  localStorage.setItem("noble_lobby", currentLobby);

  document.querySelectorAll(".server-btn").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.server === server);
  });

  document.getElementById("sessionBox").classList.toggle("hidden", server !== "247");
  document.getElementById("delayBadge").textContent = t("firstGame") + ": +" + getDelay() + " min";

  renderLobby();
  generate();
}

function selectLobby(lobby){
  currentLobby = lobby;
  localStorage.setItem("noble_lobby", lobby);
  renderLobby();
  generate();
}

function renderTimes(){
  const grid = document.getElementById("timeGrid");
  grid.innerHTML = "";
  for(let h=13; h<=23; h++){
    const btn = document.createElement("button");
    btn.className = "time-btn" + (activeHour === h ? " active" : "");
    btn.textContent = pad(h)+":00";
    btn.onclick = () => setHour(h);
    grid.appendChild(btn);
  }
}

function renderLobby(){
  const grid = document.getElementById("lobbyGrid");
  grid.innerHTML = "";

  let options = ["1","2","3"];
  if(currentServer === "solos") options.push("power");

  options.forEach(lobby=>{
    const btn = document.createElement("button");
    btn.className = "lobby-btn" + (currentLobby === lobby ? " active" : "");
    btn.textContent = getLobbyName(lobby);
    btn.onclick = () => selectLobby(lobby);
    grid.appendChild(btn);
  });
}

function showToast(text){
  const toast=document.getElementById("toast");
  toast.textContent=text;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),1200);
}

function copyText(text, label){
  navigator.clipboard.writeText(text);
  showToast(label || t("copied"));
}

function copyAnnouncement(){copyText(document.getElementById("output").value, t("announcementCopied"))}
function copyRegTimestamp(){copyText(`<t:${lastReg}:t>`, t("regCopied"))}
function copyGameTimestamp(){copyText(`<t:${lastGame}:t>`, t("gameCopied"))}
