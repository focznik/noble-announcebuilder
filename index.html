<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Noble Announcement Builder</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:#111827;
padding:25px;
border-radius:15px;
}

h1{
margin-top:0;
}

input,select,textarea,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #374151;
background:#1f2937;
color:white;
}

button{
background:#7c3aed;
cursor:pointer;
font-weight:bold;
}

textarea{
height:300px;
font-family:Consolas,monospace;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 Noble Announcement Builder</h1>

<label>Registration Opens</label>
<input type="datetime-local" id="time">

<label>Session Type</label>
<select id="type">
<option>Noble 24/7</option>
<option>Noble Solos</option>
<option>Noble Solos Closed</option>
<option>Noble Division 0</option>
<option>Noble Division 2</option>
<option>Noble Division 3</option>
</select>

<label>Session Number</label>
<input id="session" value="1">

<label>Discord User ID</label>
<input id="userid" value="1057478252865798174">

<button onclick="generate()">Generate</button>

<textarea id="output"></textarea>

</div>

<script>

function generate(){

let date=document.getElementById("time").value;
let type=document.getElementById("type").value;
let session=document.getElementById("session").value;
let user=document.getElementById("userid").value;

let reg=Math.floor(new Date(date).getTime()/1000);

let delay=15;

if(type==="Noble Solos") delay=20;
if(type==="Noble Division 0") delay=20;
if(type==="Noble Solos Closed") delay=30;

let firstGame=reg+(delay*60);

let msg=`@everyone

**${type} Session ${session}**

:arrow: Registration opens @ <t:${reg}:t>

:arrow: First Game Commences @ <t:${firstGame}:t>

The host for this session is: <@${user}>, if you need any help.

3 Games, Required at least **55+ Reacts** for 1 lobby and **110+ Reacts** for a 2nd lobby (1 per duo).`;

document.getElementById("output").value=msg;
}

</script>

</body>
</html>
