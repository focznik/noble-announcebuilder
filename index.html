<!DOCTYPE html>
<html lang="pl">

<title>Noble Announcement Builder</title>

<style>
body{
  background:#0f172a;

  padding:30px;
}
.container{
  max-width:1000px;
  margin:auto;
  background:#111827;
  padding:25px;
  border-radius:18px;
  border:1px solid #334155;
}
h1{margin-top:0}
label{font-weight:bold;margin-top:15px;display:block}
input,select,textarea,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #475569;
  background:#020617;
  color:white;
  font-size:15px;
  box-sizing:border-box;
}
button{
  background:#7c3aed;
  cursor:pointer;
  font-weight:bold;
}
textarea{
  height:430px;
  font-family:Consolas,monospace;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}
.quick-times{
  display:grid;
  grid-template-columns:repeat(6, 1fr);
  gap:8px;
  margin-top:10px;
}
.quick-times button{
  background:#020617;
  border:1px solid #475569;
}
.quick-times button:hover{
  background:#1e293b;
}
.hidden{
  display:none;
}
</style>
</head>

<label>Registration Opens</label>
<input type="datetime-local" id="time">

  <button onclick="setHour(21)">21:00</button>
  <button onclick="setHour(22)">22:00</button>

<label>Discord User ID</label>
<input id="userid" value="1057478252865798174">

<button onclick="generate()">Generate announcement</button>

<script>
function pad(n){
  return String(n).padStart(2, "0");
}

function setCurrentDateTime(){
  const now = new Date();
  const value =
    now.getFullYear() + "-" +
    pad(now.getMonth() + 1) + "-" +
    pad(now.getDate()) + "T" +
    pad(now.getHours()) + ":" +
    pad(now.getMinutes());

  document.getElementById("time").value = value;
}

function setHour(hour){
  const now = new Date();
  const value =
    now.getFullYear() + "-" +
    pad(now.getMonth() + 1) + "-" +
    pad(now.getDate()) + "T" +
    pad(hour) + ":00";

  document.getElementById("time").value = value;
}

function unix(date){
  return Math.floor(new Date(date).getTime() / 1000);
}

function toggleSessionNumber(){
  const server = document.getElementById("server").value;
  const box = document.getElementById("sessionBox");

  if(server === "247"){
    box.classList.remove("hidden");
  }else{
    box.classList.add("hidden");
  }
}
